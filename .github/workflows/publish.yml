name: publish

# Publishes to PyPI on a GitHub release, via trusted publishing (no token stored here):
# configure the publisher once at https://pypi.org/manage/account/publishing/
# (project: bausatz, owner: MatthiasDenecke, repo: bausatz, workflow: publish.yml, environment: pypi).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
